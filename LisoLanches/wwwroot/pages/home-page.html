<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liso Lanches - Delivery</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="../css/home-page.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">
                <i class="bi bi-shop me-2"></i>Liso Lanches
            </a>
            
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-secondary d-none d-md-flex align-items-center gap-2" id="btnHistory" data-bs-toggle="modal" data-bs-target="#historyModal">
                    <i class="bi bi-receipt"></i> Meus Pedidos
                </button>

                <button class="btn btn-primary d-flex align-items-center gap-2 position-relative" id="btnCart" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                    <i class="bi bi-cart3"></i> Carrinho
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount">
                        0
                    </span>
                </button>

                <div class="dropdown">
                    <a href="#" class="d-block link-dark text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="https://ui-avatars.com/api/?name=User&background=f8f9fa&color=333" alt="mdo" width="40" height="40" class="rounded-circle" id="userAvatar">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end text-small shadow" aria-labelledby="dropdownUser">
                        <li><h6 class="dropdown-header" id="userNameHeader">Olá, Usuário</h6></li>
                        <li><a class="dropdown-item d-md-none" href="#" data-bs-toggle="modal" data-bs-target="#historyModal">Meus Pedidos</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" id="btnLogout"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Banner -->
    <section class="hero-section text-center">
        <div class="container position-relative z-1">
            <h1 class="display-4 fw-bold mb-3 text-white">Bateu a fome?</h1>
            <p class="lead text-white-50 mb-4">Peça os melhores lanches com entrega rápida e quentinha!</p>
        </div>
        <div class="hero-overlay"></div>
    </section>

    <!-- Main Content: Menu Items -->
    <main class="container my-5">
        <h3 class="fw-bold mb-4">Nosso Cardápio</h3>
        <div id="loadingMenu" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Carregando delícias...</p>
        </div>
        
        <div class="row g-4" id="menuItemsContainer">
            <!-- Items rendered via JS -->
        </div>
    </main>

    <!-- Offcanvas Cart -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="cartOffcanvasLabel">Seu Pedido</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-0">
            <!-- Empty Cart Message -->
            <div class="text-center text-muted my-5" id="emptyCartMsg">
                <i class="bi bi-cart-x display-1 mb-3 d-block opacity-25"></i>
                Seu carrinho está vazio
            </div>
            
            <!-- Cart Items Container -->
            <div class="cart-items flex-grow-1 overflow-auto p-3" id="cartItemsContainer">
                <!-- Items via JS -->
            </div>

            <!-- Cart Footer -->
            <div class="cart-footer border-top p-3 bg-light">
                <div class="d-flex justify-content-between mb-3 fw-bold">
                    <span>Total</span>
                    <span class="fs-5 text-primary" id="cartTotal">R$ 0,00</span>
                </div>
                <button class="btn btn-primary w-100 py-3 fw-bold shadow" id="btnCheckout" disabled>
                    Finalizar Pedido
                </button>
            </div>
        </div>
    </div>

    <!-- Order History Modal -->
    <div class="modal fade" id="historyModal" tabindex="-1" aria-labelledby="historyModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="historyModalLabel">Meus Pedidos</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0 bg-light">
                    <div id="loadingHistory" class="text-center py-5">
                        <div class="spinner-border text-secondary" role="status"></div>
                    </div>
                    <div class="list-group list-group-flush rounded-0" id="historyContainer">
                        <!-- History via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 for nice alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- App Script -->
    <script src="../js/home-page.js"></script>
</body>
</html>
