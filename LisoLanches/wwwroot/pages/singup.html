<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LisoLanches - Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-header">
                <h2>Criar Conta</h2>
            </div>
            <div class="card-body">
                <form id="signupForm">
                    <div class="form-group">
                        <label for="firstName" class="form-label">Primeiro Nome</label>
                        <input type="text" class="form-control" id="firstName" placeholder="Seu primeiro nome" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName" class="form-label">Sobrenome</label>
                        <input type="text" class="form-control" id="lastName" placeholder="Seu sobrenome" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" placeholder="Digite uma senha segura" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirme sua senha" required>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="terms" required />
                        <label class="form-check-label" for="terms">
                            Concordo com os <a href="#" style="color: #667eea; text-decoration: none;">termos de uso</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-login">Cadastrar</button>
                </form>

                <div class="login-footer">
                    <p>Já tem conta? <a href="../index.html">Faça login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="../js/signup.js"></script>
</body>
</html>
