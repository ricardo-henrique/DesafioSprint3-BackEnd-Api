<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo - Liso Lanches</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="../css/admin-homepage.css" rel="stylesheet">
</head>
<body>

    <div class="sidebar">
        <div class="brand-logo">Liso Lanches <br><span style="font-size: 0.9rem; color: #94a3b8;">Admin Panel</span></div>
        <a href="admin-homepage.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="admin-create-item.html"><i class="bi bi-plus-circle"></i> Novo Item</a>
        <a href="#" id="logoutBtn" style="position: absolute; bottom: 20px; width: 100%;"><i class="bi bi-box-arrow-left"></i> Sair</a>
    </div>

    <div class="main-content">
        <h1 class="mb-4">Visão Geral</h1>

        <!-- Alertas de Erro (se houver) -->
        <div id="dashboard-error-container"></div>

        <!-- Card de Usuários -->
        <div class="card card-custom">
            <div class="card-header-custom d-flex justify-content-between align-items-center">
                <span>Usuários Cadastrados</span>
            </div>
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="usersTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome Completo</th>
                                <th>Email</th>
                                <th>Roles</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
                <div id="usersEmptyMessage" class="empty-message">
                    <div class="spinner-border text-secondary" role="status"></div>
                    <div class="mt-2">Carregando usuários...</div>
                </div>
            </div>
        </div>

        <!-- Card de Itens -->
        <div class="card card-custom">
            <div class="card-header-custom d-flex justify-content-between align-items-center">
                <span>Itens Cadastrados (Menu)</span>
            </div>
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="itemsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Descrição</th>
                                <th>Preço (R$)</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
                <div id="itemsEmptyMessage" class="empty-message">
                    <div class="spinner-border text-secondary" role="status"></div>
                    <div class="mt-2">Carregando itens...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.css"></script>
    <!-- Custom Script -->
    <script src="../js/admin-homepage.js"></script>
</body>
</html>
